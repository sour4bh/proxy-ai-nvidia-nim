name: Bug report
description: Report a reproducible proxy, limiter, adapter, or dashboard bug.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, request payloads, and relevant config without secrets.
      placeholder: |
        1. Start proxy with ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Node:
        pnpm:
        OS:
        Route: /v1/chat/completions
    validations:
      required: false
